name: Release Tag

# Creates (if needed):
#   - a fallback unsigned annotated git tag (when local signed tag push is blocked by relay)
#   - the GitHub Release object (with notes extracted from CHANGELOG.md)
#   - re-publishes a Release that GitHub flipped to Draft after a tag delete+replace
#
# Design:
#   - Local /release process does `git tag -s -a` (signed) + push --follow-tags.
#   - This workflow is the safety net + GH Release creator because direct tag-ref
#     pushes are often rejected (HTTP 403 from git relay in sandboxed envs).
#   - Tag existence check only gates the *unsigned tag creation*.
#   - Separate GH Release existence check ensures the rich release (title + notes)
#     is always created, even for pre-existing tags (local signed or historical).
#   - Race: package.json bump on main often creates the bot tag + Release first.
#     Replacing that tag with a local signed tag (delete remote tag, push -s)
#     briefly removes the tag, which flips the GitHub Release to Draft. The final
#     "Ensure published (not draft)" step always runs `gh release edit --draft=false`
#     when needed so a signed-tag push leaves a published Release.
#   - Supports backfill via workflow_dispatch (ref=sha) for older versions.
#
# Triggers:
#   - push to main touching package.json  -> ensure tag + GH Release for the version
#   - push of v* tag                     -> ensure GH Release + un-draft (signed replace)
#   - workflow_dispatch (optional `ref`) -> backfill/create for a specific commit
#
# Extraction is strict: fails if the version's CHANGELOG section is missing (enforces
# that the bump commit landed with proper entry per /release skill).
#
# See: /release skill, the "Publish" section, and verification via grok_com_github__get_release_by_tag.

on:
  push:
    branches: [ main ]
    paths: [ 'package.json' ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Commit SHA or branch to tag (defaults to the triggering commit)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for tagging)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Resolve version from package.json
        id: ver
        run: |
          set -euo pipefail
          v=$(node -p "require('./package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: v$v"

      - name: Check whether the tag already exists (for unsigned fallback only)
        id: check
        run: |
          set -euo pipefail
          if git ls-remote --tags origin "refs/tags/${{ steps.ver.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.ver.outputs.tag }} already exists on remote (local signed tag or prior CI)."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether GitHub Release already exists
        id: release-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${{ steps.ver.outputs.tag }}" --json tagName > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Release for ${{ steps.ver.outputs.tag }} already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG.md
        if: steps.check.outputs.exists == 'false' || steps.release-check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          export VERSION="${{ steps.ver.outputs.version }}"
          node - << 'NODE'
            const fs = require('fs');
            const v = process.env.VERSION;
            const content = fs.readFileSync('CHANGELOG.md', 'utf8');
            const lines = content.split(/\r?\n/);
            const header = new RegExp('^## \\[' + v.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\]');
            let out = [];
            let capturing = false;
            for (const line of lines) {
              if (!capturing && header.test(line)) { capturing = true; out.push(line); continue; }
              if (capturing) {
                if (/^## \[/.test(line)) break;
                out.push(line);
              }
            }
            let notes = out.join('\n').trim();
            if (!notes || !notes.startsWith('## [' + v + ']')) {
              console.error('ERROR: No CHANGELOG section found for version ' + v + ' (expected "## [' + v + '] ...").');
              console.error('The release bump commit must include an updated CHANGELOG entry (per /release skill).');
              process.exit(1);
            }
            fs.writeFileSync('RELEASE_NOTES.md', notes + '\n');
            console.log('----- release notes -----');
            console.log(notes);
          NODE

      - name: Create and push annotated tag (unsigned fallback)
        if: steps.check.outputs.exists == 'false'
        env:
          GIT_AUTHOR_NAME: 'github-actions[bot]'
          GIT_AUTHOR_EMAIL: '41898282+github-actions[bot]@users.noreply.github.com'
          GIT_COMMITTER_NAME: 'github-actions[bot]'
          GIT_COMMITTER_EMAIL: '41898282+github-actions[bot]@users.noreply.github.com'
        run: |
          set -euo pipefail
          echo "Creating unsigned annotated tag (CI fallback). Local signed tag (-s) preferred when push succeeds."
          git tag -a "${{ steps.ver.outputs.tag }}" -m "Release ${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.release-check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          target_sha="$(git rev-parse HEAD)"
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md \
            --target "$target_sha"
          echo "GitHub Release created for ${{ steps.ver.outputs.tag }}"

      # Deleting a remote tag (to replace unsigned bot tag with a signed local one)
      # makes GitHub flip the existing Release to Draft. Always re-publish here so a
      # v* tag push after replace does not leave a draft Release behind.
      - name: Ensure GitHub Release is published (not draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          if ! gh release view "$tag" --json isDraft > /dev/null 2>&1; then
            echo "ERROR: No GitHub Release for $tag after create/check steps."
            exit 1
          fi
          is_draft="$(gh release view "$tag" --json isDraft -q .isDraft)"
          if [ "$is_draft" = "true" ]; then
            echo "Release $tag is draft (typical after tag delete+recreate). Publishing with gh release edit --draft=false..."
            gh release edit "$tag" --draft=false
            is_draft="$(gh release view "$tag" --json isDraft -q .isDraft)"
            if [ "$is_draft" = "true" ]; then
              echo "ERROR: Release $tag still draft after gh release edit --draft=false"
              exit 1
            fi
            echo "Release $tag re-published (isDraft=false)."
          else
            echo "Release $tag already published (isDraft=false)."
          fi

      - name: Confirm GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          echo "Confirming GitHub Release for $tag..."
          gh release view "$tag" --json tagName,name,url,createdAt,isDraft
          is_draft="$(gh release view "$tag" --json isDraft -q .isDraft)"
          if [ "$is_draft" = "true" ]; then
            echo "ERROR: GitHub Release for $tag is still draft."
            exit 1
          fi
          echo "✅ GitHub Release confirmed published for $tag"
