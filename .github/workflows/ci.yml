name: CI

on:
  push:
    branches: [ main, 'feature/*', 'feat/*', 'fix/*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Verify (build + typecheck + test + determinism + persona)
      run: npm run verify:full

# Pinned actions + Node 22/24 matrix for stable, current runners.
# verify:full = build + typecheck + test + determinism + persona (single source, no duplicated steps).
