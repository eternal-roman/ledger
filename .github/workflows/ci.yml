name: CI

on:
  push:
    branches: [ main, 'feature/*', 'feat/*', 'fix/*', 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Verify (build + typecheck + test + determinism + MCP stdio smoke)
      run: npm run verify:full

    - name: Benchmark (guardrail must fully protect the books)
      run: npm run eval

# Pinned actions + Node 22/24 matrix for stable, current runners.
# verify:full = build + typecheck + test (kernel + MCP unit tests) + determinism
#   + verify:mcp (builds kernel + MCP, then spawns the compiled dist/server.js over
#   real stdio and asserts tools/resources/prompts — the actual `npx` end-user path).
# eval re-runs the guardrail benchmark (fixture mode, no network) and fails if any
# invariant violation reaches the books.
