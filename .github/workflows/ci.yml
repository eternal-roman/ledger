name: CI

on:
  push:
    branches: [ main, 'feat/*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Run tests
      run: npm test

    - name: Run determinism verify
      run: npm run verify

    - name: Full verify
      run: npm run verify:full

# Notes on versions:
# - actions/checkout@v4 and actions/setup-node@v4 pinned (proven stable; main CI green post lock fix).
# - Matrix updated to [22, 24] (Node 20 deprecated on GitHub runners per 2025 changelog; warnings observed in prior runs).
# - Dependabot PRs #2 (checkout 4->7) and #3 (setup-node 4->6) reviewed: 1-line changes only; based on stale pre-fix commit (c392e59) causing npm ci lock mismatch failures. Changes evaluated as low-risk but kept conservative to avoid unverified major jumps. Full audit+release required before any merge per project rules. PRs will be closed without merge.
