description = "Whole-repo audit enforcing use of the ledger kernel for monetary value"
prompt = "Perform a ledger-audit. Ensure the target uses (or models flows using) the kernel: Money.from, JournalEntry/validateEntry, Ledger.apply (or runTrace). Bootstrap the canonical if needed for the language. Scan to find monetary expressions. Reconstruct important lifecycles as kernel sequences, replay them, capture proofs (balances, equation, hash) at steps. Compare to original code with numbers. Report findings with locations, deltas, and kernel-based replacements. Produce CanonicalFinancialArtifact where appropriate. Focus on actual use of the primitives rather than surface patterns."