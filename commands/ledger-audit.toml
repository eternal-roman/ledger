description = "Whole-project financial hygiene and invariants audit"
prompt = "Perform a whole-project financial hygiene audit using ledger rules. Scan for any monetary values not using Money.from, unbalanced or unvalidated entries, use of floats, missing citations for rates/assumptions, violations of double-entry or accounting equation. For each finding give location and the exact fix or citation required. Report overall status of invariants. Use validateEntry / Ledger patterns and knowledge graph where relevant."