description = "Run ledger verification on diff, file or snippet for financial invariants (Money.from, entries, balance, citations, Artifact)"
prompt = "Run full Ledger verification on the current diff, file, or snippet. The agent must: 1. Check for the Canonical Financial Artifact (scope, assumptions log, canon citations with levers, kernel plan, proof sketch, reproducibility contract). 2. Parse for any monetary amounts and force Money.from(...) usage from the ledger package (or ledger/core). 3. Construct proper JournalEntry(s) where values or transactions are present. 4. Call validateEntry and/or Ledger.apply and prove the result. 5. Report any violations with proof (unbalanced, float usage, missing citations or artifact sections). 6. Surface required canon context or knowledge graph citations if rules/knowledge are involved. Never allow unbalanced or unverified financial state. Reference the core primitives only."