description = "Run ledger verification on diff, file or snippet for financial invariants"
prompt = "Run full Ledger verification on the current diff, file, or snippet. The agent must: 1. Parse for any monetary amounts and force Money.from(...) usage from the ledger package (or ledger/core). 2. Construct proper JournalEntry(s) where values or transactions are present. 3. Call validateEntry and/or Ledger.apply and prove the result. 4. Report any violations with proof (unbalanced, float usage, missing citations). 5. Surface required canon context or knowledge graph citations if rules/knowledge are involved. Never allow unbalanced or unverified financial state. Reference the core primitives only."