description = "Full multi-layer ledger review: invariants + host verification agents (superpowers/pr-review equivalents) when present + security. Always runs ledger layer."
prompt = "Execute the ledger-review process: 1. Apply full ledger-verify or ledger-audit. Enforce core primitives (Money.from, JournalEntry, validateEntry, Ledger.apply) and the Canonical Financial Artifact. 2. If superpowers-style TDD/verification-before-completion or host equivalents are present, confirm they were used. 3. If pr-review-toolkit agents (or equivalents: silent-failure-hunter, type-design-analyzer, pr-test-analyzer, code-reviewer) are available, invoke them after ledger checks. 4. Incorporate security findings. 5. Produce pass/fail + ranked issues. Explicitly note 'Ledger layer only (no superpowers/pr-review equivalents detected)' when optional layers are absent. Only declare overall clean when ledger invariants pass (plus available layers). Reference ledger skills and AGENTS.md."
